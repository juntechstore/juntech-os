<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juntech | Catálogo Mayorista</title>
  <style>
    :root { --bg:#07090d; --s1:#0d1117; --blue:#2f81f7; --text:#e6edf3; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .card { background: var(--s1); padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
    h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
    .stock { font-size: 0.9rem; color: #8b949e; margin-bottom: 10px; }
    input { width: 50px; background: #161b22; border: 1px solid #30363d; color: white; padding: 5px; border-radius: 5px; text-align: center; }
    button { background: var(--blue); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Catálogo Mayorista</h1>
  <div id="catalog" class="grid">Cargando productos...</div>
  <button onclick="finalizarPedido()" style="margin-top:20px; background: #25D366;">Enviar Pedido por WhatsApp</button>

  <script>
    // --- ACÁ PEGÁS LA URL QUE TE DIO GOOGLE APPS SCRIPT ---
    const API_URL = "https://script.google.com/macros/s/AKfycbzrt_PXqXnFmbakZHi94UnUcn4FHyREk5mOEdjxBCfTuv_7MBE-_YhUnTS9FjKL2zl99Q/exec";
    let carrito = {};

    fetch(API_URL)
      .then(r => r.json())
      .then(data => {
        const div = document.getElementById('catalog');
        div.innerHTML = '';
        data.forEach(p => {
          if(p.stock > 0) { // Oculta si no hay stock
            div.innerHTML += `
              <div class="card">
                <h2>${p.nombre}</h2>
                <div class="stock">Stock: ${p.stock}</div>
                <input type="number" placeholder="Cant" onchange="carrito['${p.nombre}'] = this.value">
              </div>`;
          }
        });
      });

    function finalizarPedido() {
      let msg = "¡Hola! Quiero hacer un pedido mayorista:%0A";
      for(let prod in carrito) { msg += `${carrito[prod]}x ${prod}%0A`; }
      window.open(`https://wa.me/5493521464618?text=${msg}`);
    }
  </script>
</body>
</html>
