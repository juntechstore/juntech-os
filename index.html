<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#07090d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>JuntechOS v3.1</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- CSS REORGANIZADO -->
  <style>
    :root {
      --bg:#07090d; --s1:#0d1117; --s2:#161b22; --s3:#21262d;
      --blue:#2f81f7; --red:#f85149; --cyan:#39d353;
      --text:#e6edf3; --text2:#8b949e; --border:#30363d;
    }
    /* Base */
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; }
    
    /* Componentes Generales */
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 13px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 7px; transition: 0.15s; }
    .f-in { width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; color: var(--text); outline: none; }
    
    /* Layout */
    #app { display: none; height: 100%; flex-direction: column; }
    #app.on { display: flex; }
    .scroll { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 88px; }
    
    /* Remito Pro (Oculto por defecto) */
    #remito-pro { display: none; }
    @media print {
      body * { visibility: hidden; }
      #remito-pro, #remito-pro * { visibility: visible; }
      #remito-pro { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; color: #000 !important; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-logo"><img src="icon-192.png" alt="J"></div>
  <h1>JUNTECH<span>OS</span></h1>
  <button class="login-btn" onclick="iniciarAuth()">Conectar con Google</button>
</div>

<!-- App -->
<div id="app">
  <div class="hdr">
    <div><span class="brand-name">JUNTECH</span></div>
    <button class="sync-btn" onclick="cargarTodo()">↻ Sync</button>
  </div>

  <div class="scroll">
    <!-- Aquí irían tus pestañas igual que antes -->
    <!-- [NOTA: El resto de tu estructura HTML se mantiene igual] -->
  </div>
</div>

<!-- Remito Pro -->
<div id="remito-pro">
  <!-- Tu estructura de Remito Pro -->
</div>

<script>
  /**
   * CONFIGURACIÓN E INICIALIZACIÓN
   */
  const SHEET_ID = '1S67cE2Z0DhSscWW5sxidHaAS0MTeXtVyLm0IVIsVhBM';
  let cart = [], DB = { prods: [], todo: [] };

  /**
   * MOTOR DE VENTAS Y REMITO
   */
  function prepararRemito() {
    if (!cart.length) { toast('Agregá productos al carrito', 'err'); return; }
    
    // Inyección de datos al remito
    $('remito-fecha').innerText = "Fecha: " + new Date().toLocaleDateString('es-AR');
    $('remito-cliente').innerText = $('v-cli').value || 'Cliente';
    
    let tbody = $('remito-items-print');
    tbody.innerHTML = '';
    
    let subtotal = 0;
    cart.forEach(item => {
      let sub = item.cant * item.precio;
      subtotal += sub;
      tbody.innerHTML += `<tr><td>${item.cant}</td><td>${item.nombre}</td><td>$${Math.round(sub).toLocaleString('es-AR')}</td></tr>`;
    });

    $('remito-total').innerText = Math.round(subtotal).toLocaleString('es-AR');
    
    // Impresión
    let remito = $('remito-pro');
    remito.style.display = 'block';
    window.print();
    setTimeout(() => remito.style.display = 'none', 1000);
  }

  /**
   * OPTIMIZACIÓN DE BÚSQUEDA (Debounce)
   */
  let timeoutSearch;
  function filterItems(val) {
    clearTimeout(timeoutSearch);
    timeoutSearch = setTimeout(() => {
      renderItems(val);
    }, 300); // Espera 300ms antes de filtrar para no colgar el sistema
  }

  // ... (El resto de tus funciones aquí abajo, bien ordenadas)
</script>
</body>
</html>
